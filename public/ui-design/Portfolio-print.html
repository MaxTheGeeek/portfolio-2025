<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Max Behzadi · 3D Portfolio (Print)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles-print.css" media="all">
  <style>
    /* Apply print styles always so screen preview matches output */
    body { background: #06070d; }
    .topnav, .tweaks-panel, .tweaks-toggle, [data-tweaks-panel],
    .starfield, .grid-floor, .modal-backdrop { display: none !important; }
    *, *::before, *::after { animation: none !important; transition: none !important; }
    .hub-inner { transform: rotateY(0deg) rotateX(0deg) !important; }
    .hub-core { transform: rotateY(20deg) rotateX(20deg) !important; }
    .hub-node .hub-shape { animation: none !important; }
    .hub-label { opacity: 1 !important; }
    .glass { background: #11142a !important; backdrop-filter: none !important; }
    .glass::before { display: none !important; }
    section.scene, section.hero { min-height: auto !important; padding: 30px 24px !important; }
    .timeline-track { display: none !important; }
    :root { --intensity: 0.6; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="hero.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    // Wait for fonts + Babel-transpiled scripts + a small buffer, then auto-print.
    (async () => {
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
      // wait until React has rendered
      const waitForRender = () => new Promise(res => {
        const t0 = Date.now();
        const tick = () => {
          const el = document.querySelector('.hero-name');
          if (el || Date.now() - t0 > 6000) return res();
          requestAnimationFrame(tick);
        };
        tick();
      });
      await waitForRender();
      await new Promise(r => setTimeout(r, 800));
      window.print();
    })();
  </script>
</body>
</html>
